name: CI

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUNDLE_PATH: vendor/bundle
      RUBY_VERSION: '4.0.1'
      BUNDLER_VERSION: '4.0.3'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler: ${{ env.BUNDLER_VERSION }}
          bundler-cache: false

      - name: Restore bundle cache
        id: bundle-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundler-${{ env.BUNDLER_VERSION }}-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-ruby-${{ env.RUBY_VERSION }}-bundler-${{ env.BUNDLER_VERSION }}-

      - name: Install gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle install --jobs 4 --retry 3

      - name: Save bundle cache
        if: (github.event_name == 'push') && (github.ref_name == 'main' || github.ref_name == 'develop')
        uses: actions/cache/save@v5
        with:
          path: vendor/bundle
          key: ${{ steps.bundle-cache-restore.outputs.cache-primary-key }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set dummy secrets for Fork PRs
        run: |
          echo "DEV_API_BASE_URL=${DEV_API_BASE_URL:-http://localhost:8080/dummy}" >> $GITHUB_ENV
          echo "DEV_COGNITO_CLIENT_ID=${DEV_COGNITO_CLIENT_ID:-dummy_client_id}" >> $GITHUB_ENV
          echo "DEV_S3_BUCKET_NAME=${DEV_S3_BUCKET_NAME:-dummy_bucket_name}" >> $GITHUB_ENV
        env:
          DEV_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          DEV_COGNITO_CLIENT_ID: ${{ secrets.DEV_COGNITO_CLIENT_ID }}
          DEV_S3_BUCKET_NAME: ${{ secrets.DEV_S3_BUCKET_NAME }}

      - name: Execute Unit Tests
        run: bundle exec fastlane test