name: CD

on:
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  FLAVOR_DEV: dev
  FLAVOR_PROD: prod
  FLAVOR: ''
  LANE: ''
  AWS_ROLE_ARN: ''
  SAM_STACK_NAME: ''

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          if [ "$TARGET_BRANCH" == "main" ]; then
            echo "FLAVOR=${{ env.FLAVOR_PROD }}" >> $GITHUB_ENV
            echo "LANE=build_prod" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN_PROD }}" >> $GITHUB_ENV
            echo "SAM_STACK_NAME=cloudphotos-prod-stack" >> $GITHUB_ENV
          else
            echo "FLAVOR=${{ env.FLAVOR_DEV }}" >> $GITHUB_ENV
            echo "LANE=build_dev" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=${{ secrets.AWS_ROLE_ARN_DEV }}" >> $GITHUB_ENV
            echo "SAM_STACK_NAME=cloudphotos-dev-stack" >> $GITHUB_ENV
          fi

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Execute Fastlane (DEV)
        if: env.FLAVOR == env.FLAVOR_DEV
        env:
          DEV_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          DEV_COGNITO_CLIENT_ID: ${{ secrets.DEV_COGNITO_CLIENT_ID }}
          DEV_S3_BUCKET_NAME: ${{ secrets.DEV_S3_BUCKET_NAME }}
        run: bundle exec fastlane ${{ env.LANE }}

      - name: Execute Fastlane (PROD)
        if: env.FLAVOR == env.FLAVOR_PROD
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          PROD_COGNITO_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
          PROD_S3_BUCKET_NAME: ${{ secrets.PROD_S3_BUCKET_NAME }}
        run: bundle exec fastlane ${{ env.LANE }}

      - name: Upload Artifacts (DEV)
        if: env.FLAVOR == env.FLAVOR_DEV
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.FLAVOR }}-release
          path: |
            app/build/outputs/apk/**/*.apk

      - name: Upload Artifacts (PROD)
        if: env.FLAVOR == env.FLAVOR_PROD
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.FLAVOR }}-release
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/bundle/**/*.aab

